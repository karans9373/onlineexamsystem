version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: astraexam
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
    environment:
      APP_NAME: AstraExam Pro
      ENVIRONMENT: production
      API_PREFIX: /api
      CLIENT_URL: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/astraexam
      JWT_SECRET_KEY: change-this-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: gpt-4.1-mini
      SEED_DEMO_DATA: "true"
      DEVELOPMENT_EXPOSE_OTP: "false"
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  client:
    build:
      context: ./client
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  postgres_data:
